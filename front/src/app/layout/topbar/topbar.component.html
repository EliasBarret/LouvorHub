<header class="topbar">
  <div class="topbar-left">
    <button class="menu-btn" (click)="toggleSidebar.emit()">
      <span class="material-icons-outlined">menu</span>
    </button>
  </div>
  <div class="topbar-right">
    <button class="theme-btn" (click)="toggleTheme()" [title]="themeService.isDark() ? 'Mudar para tema claro' : 'Mudar para tema escuro'">
      <span class="material-icons-outlined">
        {{ themeService.isDark() ? 'light_mode' : 'dark_mode' }}
      </span>
    </button>
    <a class="notification-btn" routerLink="/notificacoes" title="Notificações">
      <span class="material-icons-outlined">notifications_none</span>
      @if (notificationCount() > 0) {
        <span class="notification-badge">{{ notificationCount() > 99 ? '99+' : notificationCount() }}</span>
      }
    </a>
  </div>
</header>
