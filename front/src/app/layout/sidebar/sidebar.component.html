<aside class="sidebar" [class.open]="isOpen()">
  <div class="sidebar-close-mobile">
    <button class="close-btn" (click)="closed.emit()">
      <span class="material-icons-outlined">close</span>
    </button>
  </div>
  <div class="sidebar-top">
    <!-- Logo -->
    <div class="logo">
      <div class="logo-icon">
        <span class="material-icons-outlined">music_note</span>
      </div>
      <div class="logo-text">
        <span class="logo-name">LouvorHub</span>
        <span class="logo-subtitle">MINISTÉRIO</span>
      </div>
    </div>

    <!-- Navigation -->
    <nav class="nav-menu">
      @for (item of navItems; track item.route) {
        <a
          class="nav-item"
          [routerLink]="item.route"
          routerLinkActive="active"
          (click)="closed.emit()"
        >
          <span class="material-icons-outlined nav-icon">{{ item.icon }}</span>
          <span class="nav-label">{{ item.label }}</span>
        </a>
      }
    </nav>
  </div>

  <!-- User section -->
  <div class="sidebar-bottom">
    @if (usuario) {
      <div class="user-info">
        <div class="user-avatar">{{ usuario.iniciais }}</div>
        <div class="user-details">
          <span class="user-name">{{ usuario.nome }}</span>
          <span class="user-role">{{ perfilLabel }}</span>
        </div>
      </div>
    }
    <div class="user-actions">
      <button class="action-btn" title="Sair" (click)="logout()">
        <span class="material-icons-outlined">logout</span>
        <span>Sair</span>
      </button>
      <!-- <button class="action-btn theme-btn" title="Alternar tema">
        <span class="material-icons-outlined">dark_mode</span>
      </button> -->
    </div>
  </div>
</aside>
